<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eRTKas</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            background:#f3f4f6;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            background:#fff;
            width:400px;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,.15);
            text-align:center;
        }

        h1{
            color:#2563eb;
            margin-bottom:10px;
        }

        p{
            color:#666;
            margin-bottom:25px;
        }

        a{
            display:inline-block;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:12px 24px;
            border-radius:8px;
            transition:.3s;
        }

        a:hover{
            background:#1d4ed8;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🏡 eRTKas</h1>

    <p>
        Sistem Administrasi dan Keuangan RT
    </p>

    <a href="https://script.google.com/macros/s/AKfycbzlKERLHTpw1HbpbAM75XgJi63CrynBGmB-Utcw4DCaEWXqsCPsiccy0Xn79XSXaBcu/exec">
        Buka Aplikasi
    </a>
</div>

</body>
</html>
