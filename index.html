<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eRTKas</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

iframe{
    width:100%;
    height:100vh;
    border:none;
    display:block;
}

.loading{
    position:fixed;
    inset:0;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}

.spinner{
    width:45px;
    height:45px;
    border:5px solid #ddd;
    border-top:5px solid #1976d2;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}
</style>

</head>

<body>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <p style="margin-top:15px">Memuat eRTKas...</p>
</div>

<iframe
id="app"
src="https://script.google.com/macros/s/AKfycbzlKERLHTpw1HbpbAM75XgJi63CrynBGmB-Utcw4DCaEWXqsCPsiccy0Xn79XSXaBcu/exec"
onload="document.getElementById('loading').style.display='none'">
</iframe>

</body>
</html>
